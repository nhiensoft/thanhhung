    <script>
      // Script để xóa lovable badge
      function removeLovableBadge() {
        const badge = document.getElementById('lovable-badge');
        if (badge) {
          badge.remove();
          console.log('Lovable badge đã được xóa');
          return true;
        }
        return false;
      }

      // Chạy script sau khi DOM load hoàn tất
      document.addEventListener('DOMContentLoaded', function() {
        let attempts = 0;
        const maxAttempts = 5;
        const interval = 2000; // 2 giây

        function checkAndRemove() {
          if (removeLovableBadge() || attempts >= maxAttempts) {
            return;
          }
          
          attempts++;
          setTimeout(checkAndRemove, interval);
        }

        // Thử xóa ngay lập tức
        checkAndRemove();
      });
    </script>
